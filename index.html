<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الشراكة - 15% للمدير</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background-color: #219150; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f6f3; border-radius: 8px; text-align: right; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 إدارة مصاريف ومبيعات الشراكة</h2>
    <p style="color: #666;">(3 شركاء - نسبة المدير 15% من المبيعات)</p>

    <hr>

    <h3>🛒 إضافة مصروف</h3>
    <select id="payer">
        <option value="الشريك 1 (المدير)">الشريك 1 (المدير)</option>
        <option value="الشريك 2">الشريك 2</option>
        <option value="الشريك 3">الشريك 3</option>
    </select>
    <input type="number" id="expAmount" placeholder="المبلغ المدفوع (ريال)">
    <input type="text" id="expNote" placeholder="بيان المصروف (مثلاً: أعلاف)">
    <button onclick="addExpense()">تسجيل المصروف</button>

    <hr>

    <h3>💰 تسجيل بيعة</h3>
    <input type="number" id="saleAmount" placeholder="إجمالي قيمة البيع (ريال)">
    <button onclick="addSale()">تسجيل البيع وحساب العمولة</button>

    <div id="summary" class="result-box">
        <h4>📈 ملخص الحسابات اللحظي:</h4>
        <p>إجمالي المصاريف: <span id="totalExp">0</span> ريال</p>
        <p>إجمالي المبيعات: <span id="totalSales">0</span> ريال</p>
        <p><b>عمولة المدير (15%): <span id="managerFee" style="color: green;">0</span> ريال</b></p>
        <p>المتبقي للتوزيع بعد العمولة: <span id="remaining">0</span> ريال</p>
    </div>

    <div id="settlement" class="result-box" style="background: #fef9e7;">
        <h4>⚖️ تسوية الشركاء (Splitwise Style):</h4>
        <div id="details">لا توجد بيانات بعد.</div>
    </div>
</div>

<script>
    let expenses = [];
    let totalSales = 0;
    let managerTotalFee = 0;

    function addExpense() {
        const payer = document.getElementById('payer').value;
        const amount = parseFloat(document.getElementById('expAmount').value);
        if (isNaN(amount)) return alert("أدخل مبلغاً صحيحاً");

        expenses.push({ payer, amount });
        updateUI();
        document.getElementById('expAmount').value = "";
    }

    function addSale() {
        const amount = parseFloat(document.getElementById('saleAmount').value);
        if (isNaN(amount)) return alert("أدخل مبلغاً صحيحاً");

        totalSales += amount;
        managerTotalFee += (amount * 0.15);
        updateUI();
        document.getElementById('saleAmount').value = "";
    }

    function updateUI() {
        let totalExp = expenses.reduce((sum, e) => sum + e.amount, 0);
        document.getElementById('totalExp').innerText = totalExp.toFixed(2);
        document.getElementById('totalSales').innerText = totalSales.toFixed(2);
        document.getElementById('managerFee').innerText = managerTotalFee.toFixed(2);
        document.getElementById('remaining').innerText = (totalSales - managerTotalFee).toFixed(2);

        // حساب التسوية
        const sharePerPerson = totalExp / 3;
        let partners = ["الشريك 1 (المدير)", "الشريك 2", "الشريك 3"];
        let html = "<ul>";

        partners.forEach(p => {
            let pSpent = expenses.filter(e => e.payer === p).reduce((sum, e) => sum + e.amount, 0);
            let balance = pSpent - sharePerPerson;
            if (balance >= 0) {
                html += `<li>✅ <b>${p}</b>: يستحق استرداد <span style="color:green">${balance.toFixed(2)}</span> ريال</li>`;
            } else {
                html += `<li>❌ <b>${p}</b>: عليه دفع <span style="color:red">${Math.abs(balance).toFixed(2)}</span> ريال</li>`;
            }
        });
        html += "</ul>";
        document.getElementById('details').innerHTML = html;
    }
</script>

</body>
</html>

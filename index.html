<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج الحساب المشترك</title>
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2b2d42;
            --success: #4cc9f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .person-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid var(--primary);
        }

        .person-card h3 {
            margin-top: 0;
            color: var(--primary);
        }

        input[type="number"] {
            width: 80%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        .summary-card {
            background: var(--primary);
            color: white;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }

        .summary-item span {
            display: block;
            font-size: 0.9em;
            opacity: 0.9;
        }

        .summary-item strong {
            font-size: 1.5em;
        }

        .btn-reset {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: none;
            border: 1px dashed white;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>قطية الربع 💸</h1>
        <p>أدخل المبالغ المدفوعة لكل شخص</p>
    </header>

    <div class="grid">
        <div class="person-card">
            <h3>الشخص الأول</h3>
            <input type="number" id="p1" placeholder="0" oninput="calculate()">
        </div>

        <div class="person-card">
            <h3>الشخص الثاني</h3>
            <input type="number" id="p2" placeholder="0" oninput="calculate()">
        </div>

        <div class="person-card">
            <h3>الشخص الثالث</h3>
            <input type="number" id="p3" placeholder="0" oninput="calculate()">
        </div>
    </div>

    <div class="summary-card">
        <div class="summary-item">
            <span>الإجمالي المدفوع</span>
            <strong id="total">0</strong>
        </div>
        <div class="summary-item">
            <span>متوسط نصيب الفرد</span>
            <strong id="average">0</strong>
        </div>
    </div>
    
    <button class="btn-reset" onclick="resetAll()">تصفير الحسابات</button>
</div>

<script>
    function calculate() {
        const v1 = parseFloat(document.getElementById('p1').value) || 0;
        const v2 = parseFloat(document.getElementById('p2').value) || 0;
        const v3 = parseFloat(document.getElementById('p3').value) || 0;

        const total = v1 + v2 + v3;
        const avg = total / 3;

        document.getElementById('total').innerText = total.toFixed(2);
        document.getElementById('average').innerText = avg.toFixed(2);
    }

    function resetAll() {
        document.getElementById('p1').value = '';
        document.getElementById('p2').value = '';
        document.getElementById('p3').value = '';
        calculate();
    }
</script>

</body>
</html>
